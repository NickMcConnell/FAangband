name: DOS Cross-compiler

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: DOS build and runtime test
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Dependencies
        id: install_depend
        run: |
          sudo apt-get update
          sudo apt-get install make dosbox-x

      - name: Clone Project
        uses: actions/checkout@v6

      - name: Build
        run: |
          archive=djgpp-linux64-gcc1210.tar.bz2
          wget --no-verbose "https://github.com/andrewwutw/build-djgpp/releases/download/v3.3/$archive"
          bunzip2 -c "$archive"| tar -xBf -
          rm "$archive"
          PATH="$PATH":"`pwd`/djgpp/bin"
          cd src
          make -f Makefile.ibm -j$(nproc)
          make -f Makefile.ibm -j$(nproc) dist

      - name: Prepare DOS runtime environment
        run: |
          projname=$(cd src && make -f Makefile.ibm print-project-name | sed -En 's/^our-project-name=//p')
          mkdir dosroot
          wget --no-verbose https://sandmann.dotster.com/cwsdpmi/csdpmi7b.zip
          unzip csdpmi7b.zip -d dosroot
          unzip $projname.zip -d dosroot

      - name: DOS runtime smoke test
        timeout-minutes: 3
        run: |
          projname=$(cd src && make -f Makefile.ibm print-project-name | sed -En 's/^our-project-name=//p')
          exename=$(cd src && make -f Makefile.ibm print-executable-name | sed -En 's/^our-executable-name=//p' | tr "[:lower:]" "[:upper:]")
          cat > dosbox.conf << EOF
          [sdl]
          fullscreen=false
          [dosbox]
          machine=svga_s3
          [cpu]
          core=normal
          cycles=auto
          [autoexec]
          mount c dosroot
          c:
          BIN\CWSDPMI.EXE
          cd $projname
          echo "Queue keys to create DOSUSER and exit" >> ..\OUT.LOG
          addkey p500 Enter a @ Enter
          addkey p30000 ^ p500 x
          addkey p30000 Enter p1000 Enter
          echo "Run $exename" >> ..\OUT.LOG
          $exename >> ..\OUT.LOG
          echo "$exename finished" >> ..\OUT.LOG
          EOF

          rm -f dosbox.log dosroot/OUT.LOG dosroot/$projname/lib/save/DOSUSER
          dosbox-x -debug -conf dosbox.conf -nogui -exit > dosbox.log 2>&1

          echo "=== Save Directory ==="
          ls -l dosroot/$projname/lib/save || echo "(save directory not found)"

          if [ ! -f dosroot/OUT.LOG ] || ! grep -q "$exename finished" dosroot/OUT.LOG; then
            echo "ERROR: OUT.LOG missing or $exename did not finish"
            exit 1
          fi

          if [ ! -f dosroot/$projname/lib/save/DOSUSER ]; then
            echo "ERROR: DOSUSER save file missing"
            exit 1
          fi

      - name: Get Contents of OUT.LOG
        if: failure() || success()
        run: |
          echo "=== OUT.LOG ==="
          [ -f dosroot/OUT.LOG ] && cat dosroot/OUT.LOG || echo "(OUT.LOG not found)"

      - name: Get Contents of dosbox.log if Jobs Failed
        if: failure()
        run: |
          echo "=== dosbox.log ==="
          [ -f dosbox.log ] && cat dosbox.log || echo "(dosbox.log not found)"
